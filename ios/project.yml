name: StockPulse
options:
  bundleIdPrefix: com.marketpulse
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig
settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: 3U49743Z3T
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: Apple Development
targets:
  StockPulse:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    attributes:
      DevelopmentTeam: 3U49743Z3T
    sources:
      - path: StockPulse
        excludes:
          - Resources/Info.plist
    resources:
      - StockPulse/Resources/Fonts
    settings:
      base:
        DEVELOPMENT_TEAM: 3U49743Z3T
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        PRODUCT_BUNDLE_IDENTIFIER: com.marketpulse.app
        PRODUCT_NAME: StockPulse
        INFOPLIST_FILE: StockPulse/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_MASSIVE_API_KEY: $(MASSIVE_API_KEY)
        INFOPLIST_KEY_GROQ_API_KEY: $(GROQ_API_KEY)
        INFOPLIST_KEY_ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
        INFOPLIST_KEY_STOCKPULSE_API_BASE_URL: $(STOCKPULSE_API_BASE_URL)
        INFOPLIST_KEY_TRADING_API_SECRET: $(TRADING_API_SECRET)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        ENABLE_PREVIEWS: YES
    info:
      path: StockPulse/Resources/Info.plist
      properties:
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIAppFonts:
          - IBMPlexMono-Regular.ttf
          - IBMPlexMono-Bold.ttf
          - DMSans-Regular.ttf
          - DMSans-Medium.ttf
          - DMSans-SemiBold.ttf
          - DMSans-Bold.ttf
        BGTaskSchedulerPermittedIdentifiers:
          - com.marketpulse.app.morning-report
        MASSIVE_API_KEY: $(MASSIVE_API_KEY)
        GROQ_API_KEY: $(GROQ_API_KEY)
        ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
        STOCKPULSE_API_BASE_URL: $(STOCKPULSE_API_BASE_URL)
        TRADING_API_SECRET: $(TRADING_API_SECRET)
